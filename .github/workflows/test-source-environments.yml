name: Test source environments

on:
  push:
    branches:
      - master
      - codex/lab-source-runtime
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2022
          - ubuntu-22.04
    runs-on: ${{ matrix.os }}

    env:
      QT_QPA_PLATFORM: offscreen
      QT_OPENGL: software

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: |
            requirements-bootstrap-lock.txt
            requirements-lock.txt
            requirements-dev-lock.txt

      - name: Install Linux GUI runtime libraries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install locked source environment
        shell: bash
        run: |
          python -m pip install --requirement requirements-bootstrap-lock.txt
          python -m pip install --requirement requirements-dev-lock.txt
          python -m pip install --no-build-isolation --no-deps --editable .
          python scripts/verify_source_environment.py

      - name: Run static checks
        run: python -m ruff check .

      - name: Run tests
        run: python -m pytest
